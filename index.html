<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roue Privilège - Excel Coiffure</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background-overlay"></div>

<div class="container">

    <!-- Écran Avis -->
    <div id="step-avis">

        <h1>Excel Coiffure ✨</h1>

        <p class="subtitle">
            Pont Rouge - Carcassonne
        </p>

        <div class="instruction-box">

            <p>
                Merci pour votre visite ❤️<br><br>

                Laissez-nous un avis Google puis revenez sur cette page pour découvrir votre privilège.
            </p>

            <a
                class="btn-action"
                href="https://www.google.com/search?q=Excel+Coiffure+Pont+Rouge+Carcassonne#lrd=0x12ae2c396df560db:0xc4ff6ebf4d7b21dc,3"
                target="_blank"
                onclick="startFlow()">

                ⭐ LAISSER UN AVIS & DÉBLOQUER LA ROUE 🎁

            </a>

        </div>

    </div>

    <!-- Roue -->

    <div id="step-roue" class="hidden-step">

        <h1>Bonne chance 🍀</h1>

        <p class="subtitle">
            Tournez la roue pour découvrir votre privilège.
        </p>

        <div class="wheel-box">

            <div class="pointer"></div>

            <canvas
                id="wheelCanvas"
                width="600"
                height="600">
            </canvas>

            <button
                class="spin-btn"
                onclick="spin()">

                LANCER

            </button>

        </div>

        <div
            id="result-box"
            class="hidden">

            <div class="result-content">

                <span class="result-icon">✨</span>

                <p id="result-text"></p>

            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
